name: Terraform - Manual Environment Deploy------A

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment (uat, sit, production)"
        required: true
        type: choice
        options: [uat, sit, production]
      working_directory:
        description: "Terraform folder path"
        required: true
        default: "rg"

permissions:
  id-token: write
  contents: read


env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_INPUT: false
  TF_IN_AUTOMATION: true
  TF_VAR_env_name: ${{ vars.ENV_NAME }}


concurrency:
  group: terraform-${{ github.event.inputs.target_env }}
  cancel-in-progress: false

jobs:


  setup:
    name: "Setup & Branch Logic"
    runs-on: [self-hosted, Windows]
    outputs:
      selected_branch: ${{ steps.determine_branch.outputs.branch }}
    steps:
      - name: Determine Branch
        id: determine_branch
        shell: powershell
        run: |
          $env_input = "${{ github.event.inputs.target_env }}"
          if ($env_input -eq "production") {
            echo "branch=main" >> $env:GITHUB_OUTPUT
          } elseif ($env_input -eq "sit" -or $env_input -eq "uat") {
            echo "branch=$env_input" >> $env:GITHUB_OUTPUT
          } else {
            # Fallback (shouldn't hit in this workflow_dispatch)
            echo "branch=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

  terraform_plan:
    name: "Plan - ${{ github.event.inputs.target_env }}"
    needs: setup
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    outputs:
      plan_commit_sha: ${{ steps.capture_sha.outputs.sha }}
      plan_artifact_name: ${{ steps.name_artifact.outputs.art_name }}
    steps:
      - name: Checkout Code (single source of truth)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Capture Exact Commit SHA used for Plan
        id: capture_sha
        shell: powershell
        run: |
          $sha = (git rev-parse HEAD).Trim()
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Name Artifact (unique per run & env)
        id: name_artifact
        shell: powershell
        run: |
          $name = "tf-plan-${{ github.event.inputs.target_env }}-${{ github.run_id }}"
          echo "art_name=$name" >> $env:GITHUB_OUTPUT

      - name: Terraform Init
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          terraform init

      - name: Terraform Plan
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        env:          
          PLAN_PATH: ${{ runner.temp }}\tfplan
        run: |
          terraform plan -out="$env:PLAN_PATH"

      - name: Upload Plan File
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name_artifact.outputs.art_name }}
          path: ${{ runner.temp }}\tfplan
          retention-days: 1

  terraform_apply:
    name: "Apply - ${{ github.event.inputs.target_env }}"
    needs: [setup, terraform_plan]
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    steps:
      - name: Checkout Code (exact same commit as Plan)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.terraform_plan.outputs.plan_commit_sha }}

      - name: Download Plan File
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.terraform_plan.outputs.plan_artifact_name }}
          path: ${{ github.event.inputs.working_directory }}

      - name: Terraform Init
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          terraform init
       

      - name: Terraform Apply
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          terraform apply -auto-approve "tfplan"
