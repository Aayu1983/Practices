name: "Terraform infra pipeline fix it"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment"
        required: true
        type: choice
        options: [uat, sit, production, drhub]
      working_directory:
        description: "Terraform folder path"
        required: true
        default: "."

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  WORKING_DIR: ${{ github.event.inputs.working_directory }}

jobs:
  setup:
    name: "Setup"
    runs-on: [self-hosted, Windows]
    outputs:
      selected_branch: ${{ steps.determine_branch.outputs.branch }}
    steps:
      - id: determine_branch
        shell: powershell
        run: |
          $branch = if ("${{ github.event.inputs.target_env }}" -match "production|drhub") { "main" } else { "${{ github.event.inputs.target_env }}" }
          echo "branch=$branch" >> $env:GITHUB_OUTPUT

  terraform_plan:
    name: "Plan (OIDC - No Approval Needed)"
    needs: setup
    runs-on: [self-hosted, Windows]
    # YAHAN SE 'environment' HATA DIYA HAI taki approval na mangna pade
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Azure Login (OIDC via Repo Secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PLAN_CLIENT_ID }}
          tenant-id: ${{ secrets.PLAN_TENANT_ID }}
          subscription-id: ${{ secrets.PLAN_SUBSCRIPTION_ID }}

      - name: Terraform Init & Plan
        shell: powershell
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          $config = @"
          subscription_id      = "${{ secrets.BACKEND_SUBSCRIPTION_ID }}"
          storage_account_name = "${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}"
          container_name       = "${{ secrets.BACKEND_CONTAINER_NAME }}"
          resource_group_name  = "${{ secrets.BACKEND_RESOURCE_GROUP }}"
          "@
          $config | Out-File -FilePath "backend.conf" -Encoding utf8

          terraform init -backend-config="backend.conf" -reconfigure
          terraform plan -out="tfplan.binary"

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-${{ github.run_id }}
          path: ${{ env.WORKING_DIR }}/tfplan.binary

  terraform_apply:
    name: "Apply - ${{ github.event.inputs.target_env }}"
    needs: [setup, terraform_plan]
    runs-on: [self-hosted, Windows]
    # YAHAN 'environment' HAI, isliye ye approval mangega aur env secrets use karega
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tf-plan-${{ github.run_id }}
          path: ${{ env.WORKING_DIR }}

      - name: Azure Login (Secret Based via Env Secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Terraform Apply
        shell: powershell
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init -backend-config="subscription_id=${{ secrets.BACKEND_SUBSCRIPTION_ID }}" `
                         -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" `
                         -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME }}" `
                         -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" `
                         -reconfigure
          terraform apply -auto-approve "tfplan.binary"
