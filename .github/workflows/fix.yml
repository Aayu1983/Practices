name: "Terraform infra pipeline fix it"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment (uat, sit, production, drhub)"
        required: true
        type: choice
        options: [uat, sit, production, drhub]
      working_directory:
        description: "Terraform folder path"
        required: true
        default: "."

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "0"
  WORKING_DIR: ${{ github.event.inputs.working_directory }}

jobs:
  setup:
    name: "Setup & Routing"
    runs-on: [self-hosted, Windows]
    outputs:
      selected_branch: ${{ steps.determine_branch.outputs.branch }}
    steps:
      - id: determine_branch
        shell: powershell
        run: |
          $branch = if ("${{ github.event.inputs.target_env }}" -match "production|drhub") { "main" } else { "${{ github.event.inputs.target_env }}" }
          echo "branch=$branch" >> $env:GITHUB_OUTPUT

  terraform_plan:
    name: "Plan - ${{ github.event.inputs.target_env }}"
    needs: setup
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true" # Plan explicitly using OIDC
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init & Plan
        shell: powershell
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Clean Backend Config Creation
          $config = @"
          subscription_id      = "${{ secrets.BACKEND_SUBSCRIPTION_ID }}"
          storage_account_name = "${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}"
          container_name       = "${{ secrets.BACKEND_CONTAINER_NAME }}"
          resource_group_name  = "${{ secrets.BACKEND_RESOURCE_GROUP }}"
          "@
          $config | Out-File -FilePath "backend.conf" -Encoding utf8

          terraform init -backend-config="backend.conf" -reconfigure
          terraform validate
          terraform plan -out="tfplan.binary"
          terraform show -no-color "tfplan.binary" > plan_preview.txt
          Get-Content plan_preview.txt | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-${{ github.run_id }}
          path: ${{ env.WORKING_DIR }}/tfplan.binary
          retention-days: 1

  terraform_apply:
    name: "Apply - ${{ github.event.inputs.target_env }}"
    needs: [setup, terraform_plan]
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_USE_OIDC: "false" # Apply explicitly using Secret
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tf-plan-${{ github.run_id }}
          path: ${{ env.WORKING_DIR }}

      - name: Azure Login (Secret)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          client-secret: ${{ env.ARM_CLIENT_SECRET }}

      - name: Terraform Init & Apply
        shell: powershell
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Backend config reuse
          $config = @"
          subscription_id      = "${{ secrets.BACKEND_SUBSCRIPTION_ID }}"
          storage_account_name = "${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}"
          container_name       = "${{ secrets.BACKEND_CONTAINER_NAME }}"
          resource_group_name  = "${{ secrets.BACKEND_RESOURCE_GROUP }}"
          "@
          $config | Out-File -FilePath "backend.conf" -Encoding utf8

          terraform init -backend-config="backend.conf" -reconfigure
          
          if (Test-Path "tfplan.binary") {
            terraform apply -auto-approve "tfplan.binary"
          } else {
            throw "Plan file not found!"
          }
