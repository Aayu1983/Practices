name: "Terraform - Advance Composite"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment (uat, sit, production)"
        required: true
        type: choice
        options: [uat, sit, production]
      working_directory:
        description: "Terraform folder path"
        required: true
        default: "."

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.event.inputs.target_env }}
  cancel-in-progress: false

env:
  TF_INPUT: "0"
  TF_IN_AUTOMATION: true

jobs:
  setup:
    name: "Setup & Branch Logic"
    runs-on: [self-hosted, Windows]
    outputs:
      selected_branch: ${{ steps.determine_branch.outputs.branch }}
    steps:
      - name: Determine Branch
        id: determine_branch
        shell: powershell
        run: |
          $env_input = "${{ github.event.inputs.target_env }}"
          $branch = if ($env_input -eq "production") { "main" } else { $env_input }
          echo "branch=$branch" >> $env:GITHUB_OUTPUT

  terraform_plan:
    name: "Plan - ${{ github.event.inputs.target_env }}"
    needs: setup
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    outputs:
      plan_commit_sha: ${{ steps.capture_sha.outputs.sha }}
      plan_artifact_name: ${{ steps.name_artifact.outputs.art_name }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Capture Exact Commit SHA
        id: capture_sha
        shell: powershell
        run: |
          $sha = (git rev-parse HEAD).Trim()
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Name Artifact
        id: name_artifact
        shell: powershell
        run: |
          echo "art_name=tf-plan-${{ github.event.inputs.target_env }}-${{ github.run_id }}" >> $env:GITHUB_OUTPUT

      - name: Parse Vars & Terraform Init
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $file = "terraform.tfvars"
          if (!(Test-Path $file)) { throw "Error: $file not found!" }
          
          $content = Get-Content $file -Raw
          
          # Parsing with Trimming for extra safety
          $subId   = ([regex]::match($content, 'subscription-id\s*=\s*"([^"]+)"').Groups[1].Value).Trim()
          $stgName = ([regex]::match($content, 'storage_name\s*=\s*"([^"]+)"').Groups[1].Value).Trim()
          $stgCont = ([regex]::match($content, 'storage_container\s*=\s*"([^"]+)"').Groups[1].Value).Trim()

          if (-not $subId -or -not $stgName) { 
            throw "Parsing failed. Check if keys 'subscription-id' and 'storage_name' are correct in $file" 
          }

          Write-Host "Initializing Backend for Subscription: $subId"
          Write-Host "Storage Account: $stgName"

          # Force Azure Auth for the Init process
          $env:ARM_CLIENT_ID = "${{ secrets.ARM_CLIENT_ID }}"
          $env:ARM_CLIENT_SECRET = "${{ secrets.ARM_CLIENT_SECRET }}"
          $env:ARM_TENANT_ID = "${{ secrets.ARM_TENANT_ID }}"
          $env:ARM_SUBSCRIPTION_ID = "${{ secrets.ARM_SUBSCRIPTION_ID }}"

          terraform init `
            -backend-config="subscription_id=$subId" `
            -backend-config="storage_account_name=$stgName" `
            -backend-config="container_name=$stgCont" `
            -reconfigure -input=false

      - name: Terraform Validate & Plan
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          terraform validate
          terraform plan -out="tfplan.binary" -input=false
          terraform show -no-color "tfplan.binary" > plan_preview.txt
          Get-Content plan_preview.txt | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload Plan File
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name_artifact.outputs.art_name }}
          path: ${{ github.event.inputs.working_directory }}/tfplan.binary
          retention-days: 1

  terraform_apply:
    name: "Apply - ${{ github.event.inputs.target_env }}"
    needs: [setup, terraform_plan]
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code (Same Commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.terraform_plan.outputs.plan_commit_sha }}

      - name: Download Plan File
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.terraform_plan.outputs.plan_artifact_name }}
          path: ${{ github.event.inputs.working_directory }}

      - name: Re-Init Backend
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $content = Get-Content "terraform.tfvars" -Raw
          $subId   = ([regex]::match($content, 'subscription-id\s*=\s*"([^"]+)"').Groups[1].Value).Trim()
          $stgName = ([regex]::match($content, 'storage_name\s*=\s*"([^"]+)"').Groups[1].Value).Trim()
          $stgCont = ([regex]::match($content, 'storage_container\s*=\s*"([^"]+)"').Groups[1].Value).Trim()

          $env:ARM_CLIENT_ID = "${{ secrets.ARM_CLIENT_ID }}"
          $env:ARM_CLIENT_SECRET = "${{ secrets.ARM_CLIENT_SECRET }}"
          $env:ARM_TENANT_ID = "${{ secrets.ARM_TENANT_ID }}"
          $env:ARM_SUBSCRIPTION_ID = "${{ secrets.ARM_SUBSCRIPTION_ID }}"

          terraform init `
            -backend-config="subscription_id=$subId" `
            -backend-config="storage_account_name=$stgName" `
            -backend-config="container_name=$stgCont" `
            -reconfigure -input=false

      - name: Terraform Apply
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          if (Test-Path "tfplan.binary") {        
            terraform apply -auto-approve -input=false "tfplan.binary"
          } else {
            throw "Error: Plan file 'tfplan.binary' not found!"
          }
