name: "Terraform Infra Pipeline - Production Ready"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment (uat, sit, production)"
        required: true
        type: choice
        options: [uat, sit, production]
      working_directory:
        description: "Terraform folder path"
        required: true
        default: "."

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.event.inputs.target_env }}
  cancel-in-progress: false

env:
  TF_INPUT: "0"
  TF_IN_AUTOMATION: true  
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

jobs:
  # --- JOB 1: LOGIC ---
  setup:
    name: "Setup & Logic"
    runs-on: [self-hosted, Windows]
    outputs:
      selected_branch: ${{ steps.determine_branch.outputs.branch }}
    steps:
      - name: Determine Branch
        id: determine_branch
        shell: powershell
        run: |
          $env_input = "${{ github.event.inputs.target_env }}"
          $branch = if ($env_input -eq "production") { "main" } else { $env_input }
          echo "branch=$branch" >> $env:GITHUB_OUTPUT

  # --- JOB 2: PLAN ---
  terraform_plan:
    name: "Plan - ${{ github.event.inputs.target_env }}"
    needs: setup
    runs-on: [self-hosted, Windows]
    environment: plan_only # Isse plan records alag rehte hain
    outputs:
      plan_commit_sha: ${{ steps.capture_sha.outputs.sha }}
      plan_artifact_name: ${{ steps.name_artifact.outputs.art_name }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Capture Exact Commit SHA
        id: capture_sha
        shell: powershell
        run: |
          $sha = (git rev-parse HEAD).Trim()
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Name Artifact
        id: name_artifact
        shell: powershell
        run: |
          echo "art_name=tf-plan-${{ github.event.inputs.target_env }}-${{ github.run_id }}" >> $env:GITHUB_OUTPUT

      - name: Initialize Terraform Backend
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
          $file = "terraform.tfvars"
          if (!(Test-Path $file)) { throw "Error: $file not found!" }
          $content = Get-Content $file -Raw

          $subId   = ([regex]::matches($content, 'subscription_id\s*=\s*"([^"]+)"') | Select-Object -Last 1).Groups[1].Value.Trim()
          $stgName = ([regex]::matches($content, 'storage_name\s*=\s*"([^"]+)"') | Select-Object -Last 1).Groups[1].Value.Trim()
          $stgCont = ([regex]::matches($content, 'storage_container\s*=\s*"([^"]+)"') | Select-Object -Last 1).Groups[1].Value.Trim()
          $rgName  = ([regex]::matches($content, 'resource_group_name\s*=\s*"([^"]+)"') | Select-Object -Last 1).Groups[1].Value.Trim()

          terraform init `
            -backend-config="subscription_id=$subId" `
            -backend-config="storage_account_name=$stgName" `
            -backend-config="container_name=$stgCont" `
            -backend-config="resource_group_name=$rgName" `
            -input=false `
            -reconfigure

      - name: Terraform Validate & Plan
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
          terraform validate
          terraform plan -out="tfplan.binary" -input=false
          
          # Plan summary for PR/Step view
          terraform show -no-color "tfplan.binary" > plan_preview.txt
          "### 📋 Terraform Plan Summary for ${{ github.event.inputs.target_env }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Get-Content plan_preview.txt | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload Plan File
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name_artifact.outputs.art_name }}
          path: ${{ github.event.inputs.working_directory }}/tfplan.binary
          retention-days: 1

  # --- JOB 3: APPLY (With Manual Approval) ---
  terraform_apply:
    name: "Apply - ${{ github.event.inputs.target_env }}"
    needs: [setup, terraform_plan]
    runs-on: [self-hosted, Windows]
    # IMPORTANT: GitHub Environment mein 'Required Reviewers' set karein
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.terraform_plan.outputs.plan_commit_sha }}

      - name: Download Plan File
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.terraform_plan.outputs.plan_artifact_name }}          
          path: ${{ github.event.inputs.working_directory }}

      - name: Initialize Terraform Backend
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
          $content = Get-Content "terraform.tfvars" -Raw
          $subId   = ([regex]::matches($content, 'subscription_id\s*=\s*"([^"]+)"') | Select-Object -Last 1).Groups[1].Value.Trim()
          $stgName = ([regex]::matches($content, 'storage_name\s*=\s*"([^"]+)"') | Select-Object -Last 1).Groups[1].Value.Trim()
          $stgCont = ([regex]::matches($content, 'storage_container\s*=\s*"([^"]+)"') | Select-Object -Last 1).Groups[1].Value.Trim()
          $rgName  = ([regex]::matches($content, 'resource_group_name\s*=\s*"([^"]+)"') | Select-Object -Last 1).Groups[1].Value.Trim()

          terraform init `
            -backend-config="subscription_id=$subId" `
            -backend-config="storage_account_name=$stgName" `
            -backend-config="container_name=$stgCont" `
            -backend-config="resource_group_name=$rgName" `
            -input=false `
            -reconfigure

      - name: Terraform Apply
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path "tfplan.binary") {        
            terraform apply -auto-approve "tfplan.binary" -input=false
          } else {
            throw "Error: Plan file 'tfplan.binary' not found."
          }
