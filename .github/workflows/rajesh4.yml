name: "Terraform Infra Pipeline by Powershell"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment (uat, sit, production)"
        required: true
        type: choice
        options: [uat, sit, production]
      working_directory:
        description: "Terraform folder path"
        required: true
        default: "."

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.event.inputs.target_env }}
  cancel-in-progress: false

env:
  TF_INPUT: "0"
  TF_IN_AUTOMATION: true  
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

jobs:
  setup:
    name: "Setup & Branch Logic"
    runs-on: [self-hosted, Windows]
    outputs:
      selected_branch: ${{ steps.determine_branch.outputs.branch }}
    steps:
      - name: Determine Branch
        id: determine_branch
        shell: powershell
        run: |
          $env_input = "${{ github.event.inputs.target_env }}"
          $branch = if ($env_input -eq "production") { "main" } else { $env_input }
          echo "branch=$branch" >> $env:GITHUB_OUTPUT

  terraform_plan:
    name: "Plan - ${{ github.event.inputs.target_env }}"
    needs: setup
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    outputs:
      plan_commit_sha: ${{ steps.capture_sha.outputs.sha }}
      plan_artifact_name: ${{ steps.name_artifact.outputs.art_name }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Capture Exact Commit SHA
        id: capture_sha
        shell: powershell
        run: |
          $sha = (git rev-parse HEAD).Trim()
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Name Artifact
        id: name_artifact
        shell: powershell
        run: |
          echo "art_name=tf-plan-${{ github.event.inputs.target_env }}-${{ github.run_id }}" >> $env:GITHUB_OUTPUT

      - name: Initialize Terraform Backend
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
          $file = "terraform.tfvars"
          if (!(Test-Path $file)) { throw "Error: $file not found!" }
          
          # Cleanest Way: Convert strings to a Hash Table
          # Hum sirf wahi lines utha rahe hain jo key = "value" format mein hain (blocks ignore kar rahe hain)
          $kv = Get-Content $file | 
                Where-Object { $_ -match '^\s*[\w_]+\s*=\s*"[^"]+"' } | 
                ConvertFrom-StringData

          $subId   = $kv.subscription_id.Trim('"')
          $stgName = $kv.storage_name.Trim('"')
          $stgCont = $kv.storage_container.Trim('"')
          $rgName  = $kv.resource_group_name.Trim('"')

          Write-Host "Connecting to Backend Storage: $stgName in RG: $rgName"

          terraform init `
            -backend-config="subscription_id=$subId" `
            -backend-config="storage_account_name=$stgName" `
            -backend-config="container_name=$stgCont" `
            -backend-config="resource_group_name=$rgName" `
            -reconfigure

      - name: Terraform Validate & Plan
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
          terraform validate
          terraform plan -out="tfplan.binary"
          terraform show -no-color "tfplan.binary" > plan_preview.txt
          Get-Content plan_preview.txt | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload Plan File
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name_artifact.outputs.art_name }}
          path: ${{ github.event.inputs.working_directory }}/tfplan.binary
          retention-days: 1

  terraform_apply:
    name: "Apply - ${{ github.event.inputs.target_env }}"
    needs: [setup, terraform_plan]
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.terraform_plan.outputs.plan_commit_sha }}

      - name: Download Plan File
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.terraform_plan.outputs.plan_artifact_name }}          
          path: ${{ github.event.inputs.working_directory }}

      - name: Initialize Terraform Backend
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
          $kv = Get-Content "terraform.tfvars" | Where-Object { $_ -match '^\s*[\w_]+\s*=\s*"[^"]+"' } | ConvertFrom-StringData
          
          terraform init `
            -backend-config="subscription_id=$($kv.subscription_id.Trim('"'))" `
            -backend-config="storage_account_name=$($kv.storage_name.Trim('"'))" `
            -backend-config="container_name=$($kv.storage_container.Trim('"'))" `
            -backend-config="resource_group_name=$($kv.resource_group_name.Trim('"'))" `
            -reconfigure

      - name: Terraform Apply
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path "tfplan.binary") {        
            terraform apply -auto-approve "tfplan.binary"
          } else {
            throw "Error: Plan file 'tfplan.binary' not found."
          }
