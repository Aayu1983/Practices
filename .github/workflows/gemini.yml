name: Terraform - Standard Environment Deployment

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment (uat, sit, production)"
        required: true
        type: choice
        options: [uat, sit, production]
      working_directory:
        description: "Terraform folder path"
        required: true
        default: "rg"

permissions:
  id-token: write
  contents: read


env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_IN_AUTOMATION: true  
  PLAN_ARTIFACT_NAME: "tf-plan-${{ github.event.inputs.target_env }}-${{ github.run_id }}"

jobs:  
  setup:
    name: "Initialize Logic"
    runs-on: [self-hosted, Windows]
    outputs:
      selected_branch: ${{ steps.branch.outputs.name }}
    steps:
      - name: Determine Branch Logic
        id: branch
        shell: powershell
        run: |
          $env_name = "${{ github.event.inputs.target_env }}"
          $branch = if ($env_name -eq "production") { "main" } else { $env_name }
          echo "name=$branch" >> $env:GITHUB_OUTPUT
          Write-Host "Target Environment: $env_name, Using Branch: $branch"

  
  terraform_plan:
    name: "Plan [${{ github.event.inputs.target_env }}]"
    needs: setup
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    outputs:
      commit_sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.selected_branch }}

      - name: Capture SHA
        id: sha
        shell: powershell
        run: |
          $current_sha = (git rev-parse HEAD).Trim()
          echo "sha=$current_sha" >> $env:GITHUB_OUTPUT

      - name: Terraform Init, Validate & Plan
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |
          terraform init -input=false
          terraform validate          
          terraform plan -out="tfplan.binary" -var="env_name=${{ github.event.inputs.target_env }}"

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLAN_ARTIFACT_NAME }}
          path: ${{ github.event.inputs.working_directory }}\tfplan.binary
          retention-days: 1

 
  terraform_apply:
    name: "Apply [${{ github.event.inputs.target_env }}]"
    needs: [setup, terraform_plan]
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    steps:
      - name: Checkout Same Commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.terraform_plan.outputs.commit_sha }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLAN_ARTIFACT_NAME }}
          path: ${{ github.event.inputs.working_directory }}

      - name: Terraform Init & Apply
        shell: powershell
        working-directory: ${{ github.event.inputs.working_directory }}
        run: |          
          terraform init -input=false         
          terraform apply -auto-approve "tfplan.binary"
